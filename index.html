<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>hey guys</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #fff;
    /* subtle vignette + deep space gradient for cinematic depth */
    background:
      radial-gradient(ellipse at center, #0a0a12 0%, #000 70%, #000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* starfield canvas sits behind everything */
  #stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    display: block;
  }

  /* cinematic letterbox bars */
  .bar {
    position: fixed;
    left: 0;
    width: 100%;
    height: 8vh;
    background: #000;
    z-index: 3;
    transform: scaleY(0);
    animation: barIn 1.4s ease forwards;
  }
  .bar.top { top: 0; transform-origin: top; }
  .bar.bottom { bottom: 0; transform-origin: bottom; }

  @keyframes barIn {
    to { transform: scaleY(1); }
  }

  .stage {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 6vw;
  }

  .title {
    font-size: clamp(3.5rem, 18vw, 16rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 0.95;
    color: #fff;
    text-shadow: 0 0 40px rgba(255, 255, 255, 0.25);
    opacity: 0;
    transform: scale(1.18);
    filter: blur(12px);
    animation: titleReveal 3.4s cubic-bezier(0.2, 0.8, 0.2, 1) 0.8s forwards;
  }

  @keyframes titleReveal {
    0%   { opacity: 0; transform: scale(1.18); filter: blur(12px); }
    100% { opacity: 1; transform: scale(1);    filter: blur(0);    }
  }

  .subtitle {
    margin-top: clamp(1.2rem, 3vw, 2.4rem);
    font-size: clamp(0.85rem, 2.6vw, 1.6rem);
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.78);
    opacity: 0;
    transform: translateY(14px);
    animation: subReveal 2.6s ease 3.6s forwards;
  }

  @keyframes subReveal {
    0%   { opacity: 0; transform: translateY(14px); }
    100% { opacity: 0.85; transform: translateY(0); }
  }

  /* slow ambient glow that breathes under the title */
  .glow {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 80vmax;
    height: 80vmax;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(70, 90, 160, 0.18) 0%, rgba(0,0,0,0) 60%);
    z-index: 1;
    pointer-events: none;
    animation: breathe 9s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 0.9; transform: translate(-50%, -50%) scale(1.15); }
  }

  @media (max-width: 600px) {
    .subtitle { letter-spacing: 0.22em; }
    .bar { height: 6vh; }
  }
</style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="glow"></div>
  <div class="bar top"></div>
  <div class="bar bottom"></div>

  <main class="stage">
    <h1 class="title">hey guys</h1>
    <p class="subtitle">this website was made from the line at the tav</p>
  </main>

  <script>
    (function () {
      const canvas = document.getElementById("stars");
      const ctx = canvas.getContext("2d");
      let w, h, stars, dpr;

      function resize() {
        dpr = window.devicePixelRatio || 1;
        w = canvas.width = window.innerWidth * dpr;
        h = canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";
        initStars();
      }

      function initStars() {
        // density scales with screen area so phones aren't overloaded
        const count = Math.min(220, Math.floor((w * h) / (9000 * dpr)));
        stars = [];
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: (Math.random() * 1.6 + 0.3) * dpr,
            vx: (Math.random() - 0.5) * 0.15 * dpr,
            vy: (Math.random() - 0.5) * 0.15 * dpr,
            tw: Math.random() * Math.PI * 2,
            ts: Math.random() * 0.02 + 0.005
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        for (const s of stars) {
          s.x += s.vx;
          s.y += s.vy;
          s.tw += s.ts;

          // wrap drifting particles around the edges
          if (s.x < 0) s.x = w;
          if (s.x > w) s.x = 0;
          if (s.y < 0) s.y = h;
          if (s.y > h) s.y = 0;

          const alpha = 0.4 + Math.sin(s.tw) * 0.4;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(255, 255, 255, " + alpha.toFixed(3) + ")";
          ctx.fill();
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener("resize", resize);
      resize();
      draw();
    })();
  </script>
</body>
</html>
